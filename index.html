<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contagem Regressiva</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }body {
  height: 100vh;
  width: 100vw;
  background-image: url(2026_01_10_15_50_17.gif);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  font-family: Arial, Helvetica, sans-serif;
  color: white;
}

.countdown {
  margin-top: 20px;
  font-size: 2rem;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

  </style>
</head>
<body>
  <div class="countdown" id="countdown">Começa em: --:--:--</div>  <script>
    function atualizarContagem() {
      const agora = new Date();

      const amanha = new Date();
      amanha.setDate(agora.getDate() + 1);
      amanha.setHours(13, 0, 0, 0);

      const diferenca = amanha - agora;

      if (diferenca <= 0) {
        document.getElementById('countdown').textContent = 'Começou';
        return;
      }

      const horas = Math.floor(diferenca / (1000 * 60 * 60));
      const minutos = Math.floor((diferenca % (1000 * 60 * 60)) / (1000 * 60));
      const segundos = Math.floor((diferenca % (1000 * 60)) / 1000);

      document.getElementById('countdown').textContent =
        `Começa em: ${String(horas).padStart(2, '0')}:${String(minutos).padStart(2, '0')}:${String(segundos).padStart(2, '0')}`;
    }

    atualizarContagem();
    setInterval(atualizarContagem, 1000);
  </script></body>
</html>
